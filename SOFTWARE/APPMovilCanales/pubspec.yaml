name: caja_tacna_app
description: A new Flutter project.
publish_to: "none"
version: 1.8.11+76

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  animate_do: ^3.1.2
  biometric_storage: ^5.0.1
  card_swiper: ^3.0.1
  connectivity_plus: ^6.1.1
  convert: ^3.1.1
  crypto: ^3.0.3
  cryptography: ^2.7.0
  device_info_plus: ^10.1.2
  dio: ^5.3.3
  http: ^1.5.0
  flutter:
    sdk: flutter
  signalr_core: ^1.1.2
  qr_code_scanner_plus: ^2.0.10+1
  flutter_contacts: ^1.1.8
  flutter_dotenv: ^5.1.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.3.9
  flutter_riverpod: ^2.4.2
  flutter_secure_storage: ^10.0.0
  flutter_svg: ^2.0.7
  formz: ^0.8.0
  go_router: ^14.6.2
  google_mlkit_barcode_scanning: ^0.12.0
  image_picker: ^1.1.2
  http_certificate_pinning: ^3.0.1
  intl: ^0.19.0
  local_auth: ^2.3.0
  open_file: ^3.5.4
  package_info_plus: ^8.1.1
  path_provider: ^2.1.1
  permission_handler: ^11.3.1
  pin_input_text_field: ^4.5.1
  qr_flutter: ^4.1.0
  safe_device: ^1.1.6
  screenshot: ^3.0.0
  share_plus: ^10.0.0
  shared_preferences: ^2.2.1
  shimmer: ^3.0.0
  url_launcher: ^6.2.1
  uuid: ^4.1.0
  visibility_detector: ^0.4.0+2

  emv_nfc_plugin:
    path: emv_nfc_plugin
  gal: ^2.3.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

dependency_overrides:
  web_socket_channel: ^3.0.1
  web: ^1.1.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon-cmac-tacna.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#E10600"
  image: assets/icon/splash.png
  android_12:
    image: assets/icon/splash.png
    color: "#E10600"

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/icons/afiliacion-canales-electronicos/
    - assets/icons/shared/
    - assets/icons/cuenta-ahorro/
    - assets/icons/configuracion/
    - assets/icons/otras_operaciones/
    - assets/icons/operacion/
    - assets/icons/sesiones-canales-electronicos/
    - assets/icons/billetera-virtual/
